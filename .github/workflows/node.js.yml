name: Next.js CI/CD

on:
  push:
    branches: [ "prod", "staging", "dev" ]
  pull_request:
    branches: [ "prod", "staging", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run lint